<!DOCTYPE html>

<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./style/common.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
    <style>
        p,
        span {
            font-size: clamp(8px, 90%, 48px);

        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 3.5rem);

        }

        h3 {
            font-size: clamp(1.1rem, 2vw, 2.3rem);

        }

       

        .container {
            background-color: #d3d3d3;
            padding: 5px;
            border-radius: 10px;
        }
    </style>
</head>

<body class="d-flex flex-column ">
    <div class="header">
        <div>
            <a href="/progetto-piazze">
                <h3 class="m-0 "
                    style="text-transform: uppercase; color:white; font-family: Arial, Helvetica, sans-serif; margin: 3px 0 0 5px !important;">
                    PS </h3>
            </a>
        </div>
    </div>
    <div class="body gap-2 d-flex flex-column gap-2">
        <div class="m-2 d-flex justify-content-center">
            <h1 id="piazza_name" style="text-transform: uppercase; font-family: Arial, Helvetica, sans-serif;"
                class="fw-bold chip">

            </h1>
        </div>
        <div class="container">


            <div class="row gap-2 m-2">
                <div class="col d-flex align-items-center justify-content-center"><img id="piazza_img" alt="" style="max-width: min(500px, 90vw); max-height: 300px;"
                        src="./immagini/piazze/acireale.jpg"></div>


                <div class="col gap-2 d-flex flex-column">
                    <div>

                        <div>
                            <h3 class="chip">Dove mi trovo</h3>
                        </div>
                        <div class="bg-white border border-0 rounded  p-2"><span id="piazza_location"
                                class="text-decoration-underline"></span></div>
                    </div>
                    <div>

                        <div>
                            <h3 class="chip">Storia</h3>
                        </div>
                        <div class="bg-white border border-0 rounded  p-2">
                            <p id="piazza_storia"></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <footer class="footer w-100"></footer>
</body>

</html>

<!DOCTYPE html>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .card {
            position: relative;
            cursor: pointer;
            border: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        .card img,
        .card div {

            max-width: 200px;


        }

        .card img {
            border-radius: 10px 10px 0 0;
                aspect-ratio: 16 / 9;
    overflow: hidden;
        }

        .card div {
            border-radius: 10px 10px 0 0;
            position: absolute;
            top: 0;
            left: 50%;
            width: 200px;
            height: -webkit-fill-available;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.473);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition-duration: 0.5s;
            opacity: 0;
        }

        div:has(>.card) {
            height: -webkit-fill-available;
            /* border: 2px solid rgb(86, 14, 14); */
            background-color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            
            transform: translateY(0);
            transition-duration: 0.5s;
            flex-direction: column;
            gap: 10px;
            box-shadow: 3px 3px #d5cfcf;
            padding: 0 !important;
            cursor: pointer;


        }

        div:has(>.card):hover {
            transform: translateY(-5px);
            transition-duration: 0.5s;
        }

        div:hover>.card div {
            opacity: 1;
            transition-duration: 0.5s;


        }

        .card span {
            color: white;
            text-transform: capitalize;
        }

        .nomepiazza {
            color: white;
            background-color: #c22e2e;
            padding: 0.25rem;
            border-radius: 20px;
            width: max-content;
        }
    </style>
    <link rel="stylesheet" href="./style/common.css">

    <style>
        .testata {

            background-position: center;

            align-items: center;
            justify-content: center;


        }

        .testata>div {

        .testata h1 {

    </style>
